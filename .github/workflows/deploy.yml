name: CI to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 자동 치환 후 다시 push하기 위해 권한이 필요할 수 있으므로
          # 기본 토큰을 사용하거나 필요시 fetch-depth를 조절합니다.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:${{ steps.vars.outputs.sha_short }}

      # [추가된 로직] Kubernetes 배포 파일의 이미지 태그를 자동으로 치환하고 Push합니다.
      - name: Update Kubernetes resources
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-app:${{ steps.vars.outputs.sha_short }}|g" spring-app-k8s.yaml
          
          # 2. Git 설정 (Actions 봇 계정)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 3. 변경 사항 커밋 및 푸시
          git add spring-app-k8s.yaml
          git commit -m "chore: update image tag to ${{ steps.vars.outputs.sha_short }} [skip ci]"
          git push