apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "password123"  # 도커 컴포즈와 동일하게 설정
            - name: MYSQL_DATABASE
              value: "myappdb"
          ports:
            - containerPort: 3306

---

apiVersion: v1
kind: Service
metadata:
  name: mysql-service  # 중요! 나중에 Spring 앱이 이 이름으로 접속합니다.
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306       # 서비스가 노출할 포트
      targetPort: 3306 # 컨테이너 내부 포트